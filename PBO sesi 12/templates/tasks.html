<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="sidebar">
    <h2>📱 Productivity Tracker</h2>

    <a href="/">🏠 Dashboard</a>
    <a href="/screen_time">📱 Screen Time</a>
    <a href="/reminder">⏰ Reminder</a>
    <a href="/tasks">📝 Task Manager</a>
    <a href="/report">📊 Report</a>
</div>

<div class="main">

    <h1>📝 Task Manager</h1>

    <div class="form-box">

        <form action="/add_task" method="POST">

            <input
                type="text"
                name="task"
                placeholder="Masukkan tugas baru"
                required>

            <button type="submit">
                Tambah Tugas
            </button>

        </form>

    </div>

    <div class="form-box">

        <h2>Daftar Tugas</h2>

        <table>

            <tr>
                <th>No</th>
                <th>Tugas</th>
            </tr>

            {% for task in tasklist %}

            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ task }}</td>
            </tr>

            {% endfor %}

        </table>

    </div>

</div>

</body>
</html>
